spring.application.name=high-performance-url-shortener
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
api.security.token.secret=${TOKEN}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Logging padrao
logging.level.root=info

# Server
server.port=8080
server.address=0.0.0.0
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Jackson (Datas)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.visibility.field=any

# Google Gmail API

gmail.client.id=${GMAIL_CLIENT_ID}
gmail.client.secret=${GMAIL_CLIENT_SECRET}
gmail.refresh.token=${GMAIL_REFRESH_TOKEN}

# Google Auth
google.client.id=${GOOGLE_ID}

# Cors
